<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cotización de Pintura</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f4f4f4; }
    input, select { width: 100%; padding: 5px; }
    button { margin-top: 10px; padding: 8px 12px; }
  </style>
</head>
<body>
  <h2>Cotización de Pintura</h2>
  <table id="cotizacion">
    <thead>
      <tr>
        <th>Área / Trabajo</th>
        <th>Unidad</th>
        <th>Cantidad</th>
        <th>Precio por unidad</th>
        <th>Subtotal</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><input type="text" placeholder="Ej. Pared frontal"></td>
        <td>
          <select>
            <option value="m2">m²</option>
            <option value="ml">ml</option>
          </select>
        </td>
        <td><input type="number" value="0"></td>
        <td><input type="number" value="0"></td>
        <td class="subtotal">0</td>
      </tr>
    </tbody>
  </table>
  <button onclick="agregarFila()">Agregar fila</button>
  <button onclick="descargarPDF()">Descargar PDF</button>
  <h3>Total: Q<span id="total">0</span></h3>

  <!-- Librería jsPDF desde CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    function calcular() {
      let filas = document.querySelectorAll("#cotizacion tbody tr");
      let total = 0;
      filas.forEach(fila => {
        let cantidad = parseFloat(fila.cells[2].querySelector("input").value) || 0;
        let precio = parseFloat(fila.cells[3].querySelector("input").value) || 0;
        let subtotal = cantidad * precio;
        fila.querySelector(".subtotal").textContent = subtotal.toFixed(2);
        total += subtotal;
      });
      document.getElementById("total").textContent = total.toFixed(2);
    }

    function agregarFila() {
      let tbody = document.querySelector("#cotizacion tbody");
      let nuevaFila = tbody.rows[0].cloneNode(true);
      nuevaFila.querySelectorAll("input").forEach(input => input.value = "");
      nuevaFila.querySelector(".subtotal").textContent = "0";
      tbody.appendChild(nuevaFila);
    }

    document.addEventListener("input", calcular);

    function descargarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(14);
      doc.text("Cotización de Pintura", 10, 10);

      let filas = document.querySelectorAll("#cotizacion tbody tr");
      let y = 30;
      filas.forEach(fila => {
        let area = fila.cells[0].querySelector("input").value || "-";
        let unidad = fila.cells[1].querySelector("select").value;
        let cantidad = fila.cells[2].querySelector("input").value || "0";
        let precio = fila.cells[3].querySelector("input").value || "0";
        let subtotal = fila.querySelector(".subtotal").textContent;

        doc.text(`${area} | ${unidad} | Cant: ${cantidad} | Precio: Q${precio} | Subtotal: Q${subtotal}`, 10, y);
        y += 10;
      });

      let total = document.getElementById("total").textContent;
      doc.text(`TOTAL: Q${total}`, 10, y + 10);

      doc.save("cotizacion.pdf");
    }
  </script>
</body>
</html>
